<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTRL//HUB</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #080810;
    --surface:   rgba(255,255,255,0.038);
    --border:    rgba(255,255,255,0.08);
    --amber:     #f59e0b;
    --amber-dim: rgba(245,158,11,0.15);
    --cyan:      #22d3ee;
    --cyan-dim:  rgba(34,211,238,0.12);
    --text:      #e2e8f0;
    --muted:     #64748b;
    --radius:    16px;
  }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 24px;
    overflow-x: hidden;
    position: relative;
  }
  #bgCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    display: block;
  }
  .dashboard {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 960px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }
  .header-left { display: flex; flex-direction: column; gap: 6px; }
  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.3em; color: var(--muted);
    text-transform: uppercase;
  }
  .logo span { color: var(--amber); }
  .date-display {
    font-size: 12px; letter-spacing: 0.12em;
    color: var(--muted); text-transform: uppercase;
  }
  .world-clock {
    display: flex; gap: 6px;
    align-items: stretch;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .tz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    text-align: center;
    min-width: 76px;
    position: relative;
    overflow: hidden;
  }
  .tz-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  }
  .tz-card.home {
    border-color: rgba(245,158,11,0.35);
    background: rgba(245,158,11,0.07);
  }
  .tz-card.home .tz-time { color: var(--amber); }
  .tz-city {
    font-size: 9px; letter-spacing: 0.22em;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 5px;
  }
  .tz-time {
    font-family: 'Orbitron', monospace;
    font-size: 15px; font-weight: 700;
    letter-spacing: 0.05em; color: var(--text); line-height: 1;
  }
  .tz-offset {
    font-size: 9px; color: var(--cyan);
    letter-spacing: 0.1em; margin-top: 4px; min-height: 12px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  }
  .clock-card { text-align: center; padding: 40px 32px; }
  .clock-label {
    font-size: 10px; letter-spacing: 0.4em;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 16px;
  }
  .clock-time {
    font-family: 'Orbitron', monospace;
    font-size: clamp(64px, 12vw, 112px);
    font-weight: 900; letter-spacing: 0.04em; line-height: 1;
    background: linear-gradient(135deg, #ffffff 30%, #f59e0b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .clock-time .colon {
    animation: blink 1s step-end infinite;
    display: inline-block;
    -webkit-text-fill-color: #f59e0b;
  }
  @keyframes blink { 50% { opacity: 0.15; } }
  .clock-seconds {
    font-family: 'Orbitron', monospace;
    font-size: 22px; font-weight: 400;
    color: var(--amber); margin-top: 10px;
    letter-spacing: 0.2em; opacity: 0.65;
  }
  .pomo-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap; gap: 10px;
  }
  .pomo-title {
    font-size: 10px; letter-spacing: 0.4em;
    color: var(--muted); text-transform: uppercase;
  }
  .pomo-sessions { display: flex; gap: 6px; align-items: center; }
  .session-dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1.5px solid var(--border);
    transition: all 0.3s ease;
  }
  .session-dot.done    { background: var(--amber); border-color: var(--amber); }
  .session-dot.current { border-color: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .pomo-body {
    display: flex; align-items: center;
    gap: 40px; flex-wrap: wrap;
  }
  .pomo-ring-wrap { position: relative; flex-shrink: 0; }
  .pomo-ring-wrap svg { transform: rotate(-90deg); display: block; }
  .ring-bg { fill: none; stroke: rgba(255,255,255,0.06); }
  .ring-progress {
    fill: none; stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
  }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px;
  }
  .pomo-countdown {
    font-family: 'Orbitron', monospace;
    font-size: 36px; font-weight: 700;
    letter-spacing: 0.04em; color: var(--text); line-height: 1;
  }
  .pomo-mode-label {
    font-size: 10px; letter-spacing: 0.3em;
    color: var(--muted); text-transform: uppercase;
  }
  .pomo-controls {
    flex: 1; min-width: 220px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .pomo-tabs {
    display: flex; gap: 6px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px; padding: 4px;
  }
  .pomo-tab {
    flex: 1; padding: 8px 6px;
    border: none; border-radius: 7px;
    background: transparent; color: var(--muted);
    font-family: 'Syne', sans-serif; font-size: 11px;
    font-weight: 600; letter-spacing: 0.08em;
    cursor: pointer; transition: all 0.25s ease;
    text-transform: uppercase;
  }
  .pomo-tab.active {
    background: var(--amber-dim); color: var(--amber);
    box-shadow: 0 0 12px rgba(245,158,11,0.2);
  }
  .pomo-tab:hover:not(.active) { color: var(--text); }
  .duration-row { display: flex; gap: 8px; }
  .duration-group { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .duration-label {
    font-size: 9px; letter-spacing: 0.25em;
    color: var(--muted); text-transform: uppercase;
  }
  .duration-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 4px; color: var(--text);
    font-family: 'Orbitron', monospace;
    font-size: 14px; font-weight: 700; width: 100%;
    text-align: center; outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  .duration-input::-webkit-outer-spin-button,
  .duration-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .duration-input:focus { border-color: var(--amber); }
  .duration-unit {
    font-size: 8px; letter-spacing: 0.2em;
    color: var(--muted); text-align: center; text-transform: uppercase;
  }
  .pomo-btn-row { display: flex; gap: 10px; }
  .btn {
    border: none; border-radius: 10px; cursor: pointer;
    font-family: 'Syne', sans-serif; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    transition: all 0.2s ease;
  }
  .btn-primary {
    flex: 1; padding: 14px; font-size: 13px;
    background: var(--amber); color: #0a0a0f;
    box-shadow: 0 0 24px rgba(245,158,11,0.3);
  }
  .btn-primary:hover {
    background: #fbbf24;
    box-shadow: 0 0 36px rgba(245,158,11,0.45);
    transform: translateY(-1px);
  }
  .btn-primary.running {
    background: rgba(255,255,255,0.04); color: var(--amber);
    border: 1px solid var(--amber);
    box-shadow: 0 0 16px rgba(245,158,11,0.15);
  }
  .btn-secondary {
    padding: 14px 18px; font-size: 13px;
    background: rgba(255,255,255,0.04); color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .pomo-stats { display: flex; gap: 8px; }
  .stat-pill {
    flex: 1; background: rgba(255,255,255,0.03);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; display: flex; flex-direction: column; gap: 2px;
  }
  .stat-val {
    font-family: 'Orbitron', monospace; font-size: 18px;
    font-weight: 700; color: var(--text);
  }
  .stat-lbl {
    font-size: 9px; letter-spacing: 0.25em;
    color: var(--muted); text-transform: uppercase;
  }
  .pomo-card.break-mode .ring-progress { stroke: var(--cyan) !important; }
  .pomo-card.break-mode .pomo-tab.active {
    background: var(--cyan-dim); color: var(--cyan);
    box-shadow: 0 0 12px rgba(34,211,238,0.2);
  }
  .pomo-card.break-mode .btn-primary {
    background: var(--cyan); color: #0a0a0f;
    box-shadow: 0 0 24px rgba(34,211,238,0.3);
  }
  .pomo-card.break-mode .btn-primary:hover { background: #67e8f9; }
  .pomo-card.break-mode .btn-primary.running {
    background: rgba(255,255,255,0.04);
    color: var(--cyan); border-color: var(--cyan);
  }
  .pomo-card.break-mode .duration-input:focus { border-color: var(--cyan); }
  .flash-overlay {
    position: fixed; inset: 0;
    background: rgba(245,158,11,0.07);
    pointer-events: none; opacity: 0; z-index: 999;
  }
  .flash-overlay.flash { animation: flash-anim 0.9s ease forwards; }
  @keyframes flash-anim { 0%,100%{opacity:0;} 25%,65%{opacity:1;} }
  .footer {
    text-align: center; font-size: 10px;
    letter-spacing: 0.25em;
    color: rgba(100,116,139,0.3);
    text-transform: uppercase;
  }
  /* ── PI STATS PANEL ── */
  .pi-panel {
    position: fixed;
    bottom: 28px; left: 28px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 195px;
  }
  .pi-panel-title {
    font-size: 9px; letter-spacing: 0.35em;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 2px;
    display: flex; align-items: center; gap: 8px;
  }
  .pi-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
    transition: background 0.5s, box-shadow 0.5s;
  }
  .pi-dot.live { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .pi-dot.dead { background: #f43f5e; }
  .pi-stat-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    position: relative; overflow: hidden;
  }
  .pi-stat-row::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  }
  .pi-stat-top {
    display: flex; justify-content: space-between;
    align-items: baseline; margin-bottom: 6px;
  }
  .pi-stat-name {
    font-size: 9px; letter-spacing: 0.2em;
    color: var(--muted); text-transform: uppercase;
  }
  .pi-stat-val {
    font-family: 'Orbitron', monospace;
    font-size: 13px; font-weight: 700; color: var(--text);
  }
  .pi-bar-track {
    height: 3px; background: rgba(255,255,255,0.06);
    border-radius: 2px; overflow: hidden;
  }
  .pi-bar-fill {
    height: 100%; border-radius: 2px;
    background: var(--amber);
    transition: width 1.2s ease, background 0.5s;
  }
  .pi-bar-fill.warn { background: #fb923c; }
  .pi-bar-fill.crit { background: #f43f5e; }
  .pi-bar-fill.cyan { background: var(--cyan); }
  .pi-info-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .pi-info-name {
    font-size: 9px; letter-spacing: 0.2em;
    color: var(--muted); text-transform: uppercase;
  }
  .pi-info-val {
    font-family: 'Orbitron', monospace;
    font-size: 11px; font-weight: 700; color: var(--text);
  }
  .pi-offline {
    font-size: 9px; letter-spacing: 0.15em;
    color: var(--muted); text-transform: uppercase;
    text-align: center; padding: 6px 0; opacity: 0.6;
  }
  /* ── TASK PANEL ── */
  .task-panel {
    position: fixed;
    top: 28px; right: 28px; bottom: 28px;
    z-index: 10;
    width: 220px;
    display: flex;
    flex-direction: column;
    gap: 0;
    background: rgba(168,85,247,0.04);
    border: 1px solid rgba(168,85,247,0.15);
    border-radius: 16px;
    overflow: hidden;
  }
  .task-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(168,85,247,0.3), transparent);
  }
  .task-panel-header {
    padding: 16px 14px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(168,85,247,0.1);
    flex-shrink: 0;
  }
  .task-panel-title {
    font-size: 10px; letter-spacing: 0.35em;
    color: #c084fc; text-transform: uppercase;
    font-weight: 700;
  }
  .task-progress-summary {
    font-family: 'Orbitron', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.05em;
  }
  .task-add-btn {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 1px solid rgba(168,85,247,0.3);
    background: rgba(168,85,247,0.1);
    color: #c084fc;
    font-size: 16px; line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .task-add-btn:hover {
    background: rgba(168,85,247,0.2);
    border-color: rgba(168,85,247,0.5);
    box-shadow: 0 0 10px rgba(168,85,247,0.2);
  }
  /* Add form */
  .task-add-form {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(168,85,247,0.1);
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
    background: rgba(168,85,247,0.05);
  }
  .task-add-form.hidden { display: none; }
  .task-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(168,85,247,0.25);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }
  .task-input:focus { border-color: rgba(168,85,247,0.6); }
  .task-input::placeholder { color: var(--muted); font-size: 10px; }
  .task-input-date {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(168,85,247,0.25);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
    color-scheme: dark;
  }
  .task-input-date:focus { border-color: rgba(168,85,247,0.6); }
  .task-form-btns { display: flex; gap: 6px; }
  .task-form-confirm {
    flex: 1; padding: 7px;
    border: none; border-radius: 8px;
    background: rgba(168,85,247,0.3);
    color: #e9d5ff;
    font-family: 'Syne', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .task-form-confirm:hover { background: rgba(168,85,247,0.5); }
  .task-form-cancel {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 10px; cursor: pointer;
    transition: all 0.2s;
  }
  .task-form-cancel:hover { color: var(--text); }
  /* Task list */
  .task-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .task-list::-webkit-scrollbar { width: 3px; }
  .task-list::-webkit-scrollbar-track { background: transparent; }
  .task-list::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.2); border-radius: 2px; }
  .task-empty {
    font-size: 10px; letter-spacing: 0.15em;
    color: var(--muted); text-transform: uppercase;
    text-align: center; padding: 20px 0; opacity: 0.5;
  }
  /* Individual task */
  .task-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(168,85,247,0.1);
    border-radius: 10px;
    padding: 10px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, background 0.3s;
  }
  .task-item.done {
    border-color: rgba(74,222,128,0.3);
    background: rgba(74,222,128,0.05);
    box-shadow: 0 0 12px rgba(74,222,128,0.08);
  }
  .task-item::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(168,85,247,0.15), transparent);
  }
  .task-item.done::before {
    background: linear-gradient(90deg, transparent, rgba(74,222,128,0.2), transparent);
  }
  .task-info { flex: 1; min-width: 0; }
  .task-name {
    font-size: 11px; font-weight: 600;
    color: var(--text); line-height: 1.3;
    margin-bottom: 4px;
    word-break: break-word;
    transition: color 0.3s;
  }
  .task-item.done .task-name {
    color: #4ade80;
    text-shadow: 0 0 10px rgba(74,222,128,0.4);
  }
  .task-deadline {
    font-size: 9px; letter-spacing: 0.1em;
    color: var(--muted); text-transform: uppercase;
    transition: color 0.3s;
  }
  .task-deadline.soon  { color: #fb923c; }
  .task-deadline.overdue { color: #f43f5e; }
  .task-deadline.done-dl { color: #4ade80; }
  /* Delete button */
  .task-delete {
    width: 16px; height: 16px;
    border: none; background: transparent;
    color: rgba(255,255,255,0.15);
    font-size: 14px; cursor: pointer;
    line-height: 1; flex-shrink: 0;
    transition: color 0.2s;
    padding: 0;
  }
  .task-delete:hover { color: #f43f5e; }
  /* Progress ring */
  .task-ring-wrap {
    position: relative;
    flex-shrink: 0;
    cursor: pointer;
    width: 44px; height: 44px;
  }
  .task-ring-wrap svg { transform: rotate(-90deg); display: block; }
  .task-ring-bg  { fill: none; stroke: rgba(255,255,255,0.06); }
  .task-ring-fill {
    fill: none; stroke-linecap: round;
    transition: stroke-dashoffset 0.4s ease, stroke 0.4s ease;
  }
  .task-ring-pct {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 8px; font-weight: 700;
    color: var(--muted);
    pointer-events: none;
    transition: color 0.3s;
  }
  .task-item.done .task-ring-pct {
    color: #4ade80;
    text-shadow: 0 0 8px rgba(74,222,128,0.6);
  }
  @media (max-width: 620px) {
    .pomo-body { flex-direction: column; align-items: center; }
    .pomo-controls { width: 100%; }
    .world-clock { justify-content: flex-start; }
    .header { flex-direction: column; }
    body { padding: 20px 16px; gap: 16px; }
    .task-panel { display: none; }
    .pi-panel { display: none; }
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="flash-overlay" id="flashOverlay"></div>

<div class="dashboard">
  <div class="header">
    <div class="header-left">
      <div class="logo">CTRL<span>//</span>HUB</div>
      <div class="date-display" id="dateDisplay">—</div>
    </div>
    <div class="world-clock">
      <div class="tz-card home">
        <div class="tz-city">London</div>
        <div class="tz-time"   id="tz-london">--:--</div>
        <div class="tz-offset" id="od-london"></div>
      </div>
      <div class="tz-card">
        <div class="tz-city">New York</div>
        <div class="tz-time"   id="tz-newyork">--:--</div>

<script>
// ═══════════════════════════════════════════════
//  BACKGROUND — all via canvas (no CSS blur)
//  Works on Firefox, Chrome, Pi, mobile
// ═══════════════════════════════════════════════
(function () {
  const canvas = document.getElementById('bgCanvas');
  const ctx    = canvas.getContext('2d');
  let W = 0, H = 0;

  // Orbs — rendered as radial canvas gradients
  const ORBS = [
    { xPct: -0.10, yPct: -0.20, size: 0.85, r: 245, g: 158, b: 11,  alpha: 0.22, spd: 0.0009, ph: 0.0   },
    { xPct:  0.90, yPct:  0.80, size: 0.72, r:  34, g: 211, b: 238, alpha: 0.18, spd: 0.0012, ph: 2.094 },
    { xPct:  0.55, yPct:  0.48, size: 0.50, r: 245, g: 158, b: 11,  alpha: 0.13, spd: 0.0007, ph: 4.189 },
  ];

  // Particles
  const N = 55;
  let pts = [], conns = [];
  const MAX_C = 6, C_DIST = 115, C_PROB = 0.003;

  function mkPt(bottom) {
    const t = Math.random();
    const type = t < 0.08 ? 1 : t < 0.14 ? 2 : 0; // 0=white 1=amber 2=cyan
    return {
      x: Math.random() * W,
      y: bottom ? H + Math.random() * 60 : Math.random() * H,
      r: Math.random() * 1.3 + 0.4,
      vx: (Math.random() - 0.5) * 0.13,
      vy: -(Math.random() * 0.18 + 0.05),
      a: Math.random() * 0.32 + 0.06,
      type, ph: Math.random() * 6.28, ps: 0.007 + Math.random() * 0.011,
    };
  }
  function rgb(type) {
    return type === 1 ? [245,158,11] : type === 2 ? [34,211,238] : [200,215,235];
  }
  function init() {
    pts   = Array.from({length: N}, () => mkPt(false));
    conns = [];
  }

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  // 30fps throttle
  let last = 0;
  function frame(ts) {
    requestAnimationFrame(frame);
    if (ts - last < 33) return;
    last = ts;
    ctx.clearRect(0, 0, W, H);

    // ── Orbs ──
    ORBS.forEach(o => {
      o.ph += o.spd;
      const pulse = 0.82 + 0.18 * Math.sin(o.ph);
      const cx = o.xPct * W, cy = o.yPct * H;
      const rad = o.size * Math.min(W, H) * 0.5;
      const sx = (o.size * W * 0.5) / rad;
      const sy = (o.size * H * 0.5) / rad;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(sx, sy);
      const g = ctx.createRadialGradient(0, 0, 0, 0, 0, rad);
      g.addColorStop(0,    `rgba(${o.r},${o.g},${o.b},${(o.alpha * pulse).toFixed(3)})`);
      g.addColorStop(0.45, `rgba(${o.r},${o.g},${o.b},${(o.alpha * pulse * 0.35).toFixed(3)})`);
      g.addColorStop(1,    `rgba(${o.r},${o.g},${o.b},0)`);
      ctx.beginPath();
      ctx.arc(0, 0, rad, 0, 6.2832);
      ctx.fillStyle = g;
      ctx.fill();
      ctx.restore();
    });

    // ── Connection flares ──
    conns = conns.filter(c => c.life < c.max);
    conns.forEach(c => {
      c.life++;
      const alpha = Math.sin((c.life / c.max) * Math.PI) * 0.14;
      const pa = pts[c.a], pb = pts[c.b];
      if (!pa || !pb) return;
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.strokeStyle = `rgba(245,158,11,${alpha.toFixed(3)})`;
      ctx.lineWidth = 0.6;
      ctx.stroke();
    });

    // ── Particles ──
    pts.forEach((p, i) => {
      p.ph += p.ps;
      p.x  += p.vx;
      p.y  += p.vy;
      if (p.x < -20) p.x = W + 10;
      if (p.x > W + 20) p.x = -10;
      if (p.y < -12) { pts[i] = mkPt(true); return; }

      let a = p.a;
      if (p.y < H * 0.1) a *= p.y / (H * 0.1);
      if (p.type !== 0)   a *= 0.5 + 0.5 * Math.sin(p.ph);

      const [r, g, b] = rgb(p.type);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, 6.2832);
      ctx.fillStyle = `rgba(${r},${g},${b},${a.toFixed(3)})`;
      ctx.fill();

      if (p.type !== 0 && a > 0.09) {
        const gr = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 5);
        gr.addColorStop(0, `rgba(${r},${g},${b},${(a * 0.22).toFixed(3)})`);
        gr.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 5, 0, 6.2832);
        ctx.fillStyle = gr;
        ctx.fill();
      }

      if (conns.length < MAX_C && Math.random() < C_PROB) {
        const j = Math.floor(Math.random() * N);
        if (j !== i) {
          const dx = p.x - pts[j].x, dy = p.y - pts[j].y;
          if (dx*dx + dy*dy < C_DIST*C_DIST) {
            conns.push({a: i, b: j, life: 0, max: 80 + Math.random() * 55});
          }
        }
      }
    });
  }

  resize();
  init();
  requestAnimationFrame(frame);
  window.addEventListener('resize', () => { resize(); init(); });
})();

// ═══════════════════════════════════════════════
//  CLOCK + WORLD CLOCK
// ═══════════════════════════════════════════════
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const ZONES  = [
  {id:'london',  iana:'Europe/London'},
  {id:'newyork', iana:'America/New_York'},
  {id:'dubai',   iana:'Asia/Dubai'},
  {id:'tokyo',   iana:'Asia/Tokyo'},
  {id:'sydney',  iana:'Australia/Sydney'},
];
function pad(n){ return String(n).padStart(2,'0'); }

function updateClock(){
  const now = new Date();
  document.getElementById('clockHH').textContent = pad(now.getHours());
  document.getElementById('clockMM').textContent = pad(now.getMinutes());
  document.getElementById('clockSS').textContent = pad(now.getSeconds());
  document.getElementById('dateDisplay').textContent =
    `${DAYS[now.getDay()]}  ·  ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

  const londonDate = now.toLocaleDateString('en-GB', {timeZone:'Europe/London'});
  ZONES.forEach(z => {
    document.getElementById(`tz-${z.id}`).textContent =
      now.toLocaleTimeString('en-GB', {timeZone:z.iana, hour:'2-digit', minute:'2-digit', hour12:false});
    const zd  = now.toLocaleDateString('en-GB', {timeZone:z.iana});
    const odEl = document.getElementById(`od-${z.id}`);
    if (z.id === 'london' || zd === londonDate) { odEl.textContent = ''; return; }
    const parse = s => { const [d,m,y] = s.split('/').map(Number); return new Date(y,m-1,d); };
    const diff  = Math.round((parse(zd)-parse(londonDate))/86400000);
    odEl.textContent = diff > 0 ? `+${diff}d` : `${diff}d`;
  });
}
updateClock();
setInterval(updateClock, 1000);

// ═══════════════════════════════════════════════
//  POMODORO
// ═══════════════════════════════════════════════
const DEF    = {focus:25, short:5, long:15};
const LABELS = {focus:'Focus', short:'Short Break', long:'Long Break'};
const BRK    = {focus:false, short:true, long:true};
let mode = 'focus', total = 1500, rem = 1500, running = false, tid = null;
let sessions = 0, focMin = 0, streak = 0;
const CIRC = 2 * Math.PI * 78;
const ringEl = document.getElementById('ringProgress');
const cdEl   = document.getElementById('pomoCountdown');
const mlEl   = document.getElementById('pomoModeLabel');
const sBtn   = document.getElementById('startBtn');
const pCard  = document.getElementById('pomoCard');

function getMins(m){
  const ids={focus:'inputFocus',short:'inputShort',long:'inputLong'};
  const v=parseInt(document.getElementById(ids[m]).value,10);
  return(!isNaN(v)&&v>=1)?Math.min(v,99):DEF[m];
}
function setMode(m){
  if(running)return;
  mode=m; total=getMins(m)*60; rem=total;
  mlEl.textContent=LABELS[m];
  document.querySelectorAll('.pomo-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===m));
  if(BRK[m]){pCard.classList.add('break-mode');ringEl.style.stroke='#22d3ee';}
  else{pCard.classList.remove('break-mode');ringEl.style.stroke='#f59e0b';}
  upDisp(); upRing();
}
function onDurationChange(m){
  if(m===mode&&!running){total=getMins(m)*60;rem=total;upDisp();upRing();}
}
function upDisp(){ cdEl.textContent=`${pad(Math.floor(rem/60))}:${pad(rem%60)}`; }
function upRing(){ ringEl.style.strokeDasharray=CIRC; ringEl.style.strokeDashoffset=CIRC*(1-rem/total); }
function toggleTimer(){
  if(running){clearInterval(tid);running=false;sBtn.textContent='Resume';sBtn.classList.remove('running');}
  else{running=true;sBtn.textContent='Pause';sBtn.classList.add('running');tid=setInterval(tick,1000);}
}
function tick(){
  if(rem<=0){clearInterval(tid);running=false;onComplete();return;}
  rem--; upDisp(); upRing();
}
function onComplete(){
  playBeep(); flash();
  sBtn.textContent='Start'; sBtn.classList.remove('running');
  if(mode==='focus'){
    sessions++; focMin+=getMins('focus'); streak++;
    document.getElementById('statSessions').textContent=sessions;
    document.getElementById('statFocused').textContent=focMin+'m';
    document.getElementById('statStreak').textContent=streak;
    renderDots();
    setMode(sessions%4===0?'long':'short');
  } else { setMode('focus'); }
}
function resetTimer(){
  clearInterval(tid);running=false;
  total=getMins(mode)*60;rem=total;
  upDisp();upRing();
  sBtn.textContent='Start';sBtn.classList.remove('running');
}
function renderDots(){
  const c=document.getElementById('sessionDots');
  c.innerHTML='';
  const n=Math.min(sessions+1,8);
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.className='session-dot'+(i<sessions?' done':' current');
    c.appendChild(d);
  }
}

// ═══════════════════════════════════════════════
//  AUDIO + FLASH
// ═══════════════════════════════════════════════
function playBeep(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    [[523.25,0],[659.25,0.18],[783.99,0.36]].forEach(([f,d])=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.type='sine';o.frequency.value=f;
      const t=ac.currentTime+d;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.25,t+0.04);
      g.gain.linearRampToValueAtTime(0,t+0.22);
      o.start(t);o.stop(t+0.25);
    });
  }catch(e){}
}
function flash(){
  const el=document.getElementById('flashOverlay');
  el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');
}


// ═══════════════════════════════════════════════
//  TASK TRACKER
// ═══════════════════════════════════════════════
const TASK_KEY = 'ctrlhub_tasks';
const RING_R   = 18;
const RING_C   = 2 * Math.PI * RING_R;

let tasks = [];

function loadTasks() {
  try { tasks = JSON.parse(localStorage.getItem(TASK_KEY)) || []; }
  catch(e) { tasks = []; }
}

function saveTasks() {
  localStorage.setItem(TASK_KEY, JSON.stringify(tasks));
}

function toggleAddForm() {
  const form = document.getElementById('taskAddForm');
  form.classList.toggle('hidden');
  if (!form.classList.contains('hidden')) {
    document.getElementById('taskNameInput').focus();
    // Default date to today
    const today = new Date();
    const iso = today.toISOString().split('T')[0];
    document.getElementById('taskDateInput').value = iso;
  }
}

function confirmAddTask() {
  const name = document.getElementById('taskNameInput').value.trim();
  const date = document.getElementById('taskDateInput').value;
  if (!name) { document.getElementById('taskNameInput').focus(); return; }
  tasks.push({ id: Date.now(), name, deadline: date, progress: 0 });
  saveTasks();
  document.getElementById('taskNameInput').value = '';
  document.getElementById('taskAddForm').classList.add('hidden');
  renderTasks();
}

// Allow Enter key to confirm
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const form = document.getElementById('taskAddForm');
    if (!form.classList.contains('hidden')) confirmAddTask();
  }
});

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  renderTasks();
}

function bumpProgress(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.progress = Math.min(100, t.progress + 5);
  saveTasks();
  renderTasks();
}

function deadlineStatus(dateStr) {
  if (!dateStr) return '';
  const now      = new Date(); now.setHours(0,0,0,0);
  const deadline = new Date(dateStr);
  const diff     = Math.round((deadline - now) / 86400000);
  if (diff < 0)  return 'overdue';
  if (diff <= 7) return 'soon';
  return '';
}

function deadlineLabel(dateStr) {
  if (!dateStr) return '';
  const deadline = new Date(dateStr);
  return deadline.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

// Gradient colour for ring based on progress
function ringColor(progress) {
  if (progress >= 100) return '#4ade80';
  // amber -> purple gradient
  const t = progress / 100;
  const r = Math.round(245 + (168 - 245) * t);
  const g = Math.round(158 + (85  - 158) * t);
  const b = Math.round(11  + (247 - 11)  * t);
  return `rgb(${r},${g},${b})`;
}

function ringGlow(progress) {
  if (progress >= 100) return '0 0 10px rgba(74,222,128,0.6), 0 0 20px rgba(74,222,128,0.3)';
  const t = progress / 100;
  const r = Math.round(245 + (168 - 245) * t);
  const g = Math.round(158 + (85  - 158) * t);
  const b = Math.round(11  + (247 - 11)  * t);
  return `0 0 8px rgba(${r},${g},${b},0.5)`;
}

function sortedTasks() {
  return [...tasks].sort((a, b) => {
    if (!a.deadline && !b.deadline) return 0;
    if (!a.deadline) return 1;
    if (!b.deadline) return -1;
    return new Date(a.deadline) - new Date(b.deadline);
  });
}

function renderTasks() {
  const list    = document.getElementById('taskList');
  const summary = document.getElementById('taskSummary');
  const sorted  = sortedTasks();
  const done    = tasks.filter(t => t.progress >= 100).length;
  summary.textContent = `${done}/${tasks.length}`;

  if (sorted.length === 0) {
    list.innerHTML = '<div class="task-empty">No tasks yet</div>';
    return;
  }

  list.innerHTML = sorted.map(t => {
    const pct      = t.progress;
    const offset   = RING_C * (1 - pct / 100);
    const color    = ringColor(pct);
    const glow     = ringGlow(pct);
    const isDone   = pct >= 100;
    const dlStatus = isDone ? 'done-dl' : deadlineStatus(t.deadline);
    const dlLabel  = deadlineLabel(t.deadline);

    return `
    <div class="task-item${isDone ? ' done' : ''}" id="task-${t.id}">
      <div class="task-info">
        <div class="task-name">${t.name}</div>
        ${dlLabel ? `<div class="task-deadline ${dlStatus}">${dlLabel}</div>` : ''}
      </div>
      <div class="task-ring-wrap" onclick="bumpProgress(${t.id})" title="Click to add 5%">
        <svg width="44" height="44" viewBox="0 0 44 44">
          <circle class="task-ring-bg" cx="22" cy="22" r="${RING_R}" stroke-width="3.5"/>
          <circle class="task-ring-fill" cx="22" cy="22" r="${RING_R}"
            stroke-width="3.5"
            stroke="${color}"
            stroke-dasharray="${RING_C}"
            stroke-dashoffset="${offset}"
            style="filter: drop-shadow(${glow})"/>
        </svg>
        <div class="task-ring-pct">${pct}%</div>
      </div>
      <button class="task-delete" onclick="deleteTask(${t.id})" title="Delete">&times;</button>
    </div>`;
  }).join('');
}

loadTasks();
renderTasks();

// ═══════════════════════════════════════════════
//  PI STATS
// ═══════════════════════════════════════════════
const PI_URL = 'http://localhost:5050/stats';

function barClass(val, warnAt, critAt) {
  if (val >= critAt) return 'crit';
  if (val >= warnAt) return 'warn';
  return '';
}

function tempClass(t) {
  if (t >= 75) return 'crit';
  if (t >= 60) return 'warn';
  return 'cyan';
}

function statRow(label, val, pct, barCls) {
  return `
  <div class="pi-stat-row">
    <div class="pi-stat-top">
      <div class="pi-stat-name">${label}</div>
      <div class="pi-stat-val">${val}</div>
    </div>
    <div class="pi-bar-track">
      <div class="pi-bar-fill ${barCls}" style="width:${pct}%"></div>
    </div>
  </div>`;
}

function infoRow(label, val) {
  return `
  <div class="pi-info-row">
    <div class="pi-info-name">${label}</div>
    <div class="pi-info-val">${val}</div>
  </div>`;
}

function formatUptime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

async function fetchPiStats() {
  try {
    const res  = await fetch(PI_URL, { signal: AbortSignal.timeout(2500) });
    const data = await res.json();

    document.getElementById('piDot').className = 'pi-dot live';

    const cpuPct  = Math.round(data.cpu);
    const ramPct  = Math.round(data.ram);
    const temp    = parseFloat(data.temp).toFixed(1);
    const freqMhz = Math.round(data.freq);
    const ip      = data.ip || '—';
    const uptime  = formatUptime(data.uptime);

    document.getElementById('piStatsInner').innerHTML =
      statRow('CPU',  cpuPct + '%',  cpuPct, barClass(cpuPct, 70, 90)) +
      statRow('RAM',  ramPct + '%',  ramPct, barClass(ramPct, 70, 90)) +
      statRow('Temp', temp + '°C',   Math.min(temp, 100), tempClass(temp)) +
      infoRow('Freq',   freqMhz + ' MHz') +
      infoRow('IP',     ip) +
      infoRow('Uptime', uptime);

  } catch (e) {
    document.getElementById('piDot').className = 'pi-dot dead';
    document.getElementById('piStatsInner').innerHTML =
      '<div class="pi-offline">Server offline</div>';
  }
}

fetchPiStats();
setInterval(fetchPiStats, 3000);

renderDots(); upDisp(); upRing();
</script>
</body>
